<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIVE Rewards - TikTok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f8f8; margin: 0; padding: 0; }
        .tiktok-red { background-color: #FE2C55; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [step, setStep] = useState('dashboard');
            const [username, setUsername] = useState('lilymacedo11');
            const [amount, setAmount] = useState('25,000.00');

            const DATA = {
                balance: "31,399,000.00",
                upcoming: "52,800.00",
                limit: "588,000 / 10M",
                date: "4/5/2026, 12:42:33",
                requestId: "3690967545822"
            };

            // --- UI SCREENS ---

            // 1. DASHBOARD WITH IN/OUT TRANSLATIONS
            if (step === 'dashboard') return (
                <div className="max-w-[420px] mx-auto bg-white min-h-screen flex flex-col shadow-xl">
                    <header className="px-4 py-3 flex items-center border-b border-gray-100 sticky top-0 bg-white z-10">
                        <i className="bi bi-chevron-left text-xl"></i>
                        <h1 className="flex-1 text-center font-bold text-[17px]">LIVE rewards</h1>
                        <i className="bi bi-question-circle text-xl"></i>
                    </header>

                    <div className="p-4 space-y-4 bg-[#F8F8F8] flex-1">
                        {/* Identity Verified Card */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-start gap-3">
                            <i className="bi bi-shield-check text-blue-500 text-lg"></i>
                            <div>
                                <p className="font-bold text-[14px]">Identity verified</p>
                                <p className="text-[12px] text-gray-400">Your identity is verified. You can continue with transactions.</p>
                            </div>
                        </div>

                        {/* Balance Card */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div className="flex justify-between text-[11px] font-bold text-gray-400 mb-8 uppercase">
                                <div className="text-left">Available rewards<br/><span className="text-black text-[13px]">USD{DATA.balance}</span></div>
                                <div className="text-right">Upcoming rewards<br/><span className="text-black text-[13px] flex items-center justify-end"><span className="w-1.5 h-1.5 bg-red-500 rounded-full mr-1"></span>USD{DATA.upcoming}</span></div>
                            </div>
                            <div className="text-center mb-10">
                                <p className="text-[12px] text-gray-400 mb-1">Available rewards</p>
                                <h2 className="text-[36px] font-[900] tracking-tighter leading-none">{DATA.balance}</h2>
                            </div>
                            <button onClick={() => setStep('user_search')} className="w-full tiktok-red text-white py-3.5 rounded-lg font-bold text-[16px]">Transfer</button>
                            <button className="w-full bg-[#F1F1F2] text-black py-3.5 rounded-lg font-bold text-[16px] border border-gray-200 mt-3">Exchange</button>
                        </div>

                        {/* Limit Card */}
                        <div className="bg-white p-4 rounded-xl border border-gray-100">
                            <p className="text-[11px] text-gray-400 font-bold uppercase mb-1">Daily transfer limit (Remain/Total)</p>
                            <p className="font-bold text-[15px]">{DATA.limit}</p>
                        </div>

                        {/* TRANSACTIONS SECTION WITH IN AND OUT */}
                        <div className="pt-2">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-bold text-gray-900">Transactions</h3>
                                <div className="text-gray-400 text-xs font-bold uppercase flex items-center gap-1">All types <i className="bi bi-chevron-right"></i></div>
                            </div>

                            <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                                {/* Table Headers */}
                                <div className="flex px-4 py-3 bg-gray-50/50 border-b border-gray-100 text-[11px] font-bold text-gray-400 uppercase tracking-widest">
                                    <div className="w-1/4">Date</div>
                                    <div className="w-1/2 text-center">In</div>
                                    <div className="w-1/4 text-right">Out</div>
                                </div>

                                {/* "OUT" Transaction (Clickable) */}
                                <div 
                                    onClick={() => setStep('details_popup')}
                                    className="flex px-4 py-5 border-b border-gray-50 items-center cursor-pointer active:bg-gray-50"
                                >
                                    <div className="w-1/4">
                                        <p className="text-[12px] font-bold text-gray-900">April</p>
                                        <p className="text-[10px] text-gray-400">2026</p>
                                    </div>
                                    <div className="w-1/2 text-center">
                                        <p className="text-gray-200">—</p>
                                    </div>
                                    <div className="w-1/4 text-right">
                                        <p className="text-[14px] font-black text-gray-900">USD25,000.00</p>
                                        <p className="text-[10px] text-green-600 font-bold">Complete</p>
                                    </div>
                                </div>

                                {/* "IN" Transaction Example */}
                                <div className="flex px-4 py-5 items-center opacity-60">
                                    <div className="w-1/4">
                                        <p className="text-[12px] font-bold text-gray-900">April</p>
                                        <p className="text-[10px] text-gray-400">2026</p>
                                    </div>
                                    <div className="w-1/2 text-center">
                                        <p className="text-[14px] font-black text-gray-900">USD31,399,000</p>
                                    </div>
                                    <div className="w-1/4 text-right">
                                        <p className="text-gray-200">—</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // 2. USER SEARCH
            if (step === 'user_search') return (
                <div className="max-w-[420px] mx-auto bg-white min-h-screen">
                    <header className="px-4 py-3 flex items-center border-b border-gray-100">
                        <i className="bi bi-x-lg text-xl cursor-pointer" onClick={() => setStep('dashboard')}></i>
                        <h1 className="flex-1 text-center font-bold text-[17px] mr-6">Recipient</h1>
                    </header>
                    <div className="p-6 space-y-6">
                        <input type="text" className="w-full bg-gray-100 p-4 rounded-xl outline-none font-bold" placeholder="TikTok Username" value={username} onChange={(e) => setUsername(e.target.value)} />
                        <button onClick={() => setStep('amount')} className="w-full tiktok-red text-white py-4 rounded-xl font-bold">Next</button>
                    </div>
                </div>
            );

            // 3. AMOUNT ENTRY
            if (step === 'amount') return (
                <div className="max-w-[420px] mx-auto bg-white min-h-screen">
                    <header className="px-4 py-3 flex items-center border-b border-gray-100">
                        <i className="bi bi-arrow-left text-xl cursor-pointer" onClick={() => setStep('user_search')}></i>
                        <h1 className="flex-1 text-center font-bold text-[17px] mr-6">Amount</h1>
                    </header>
                    <div className="p-8 text-center">
                        <p className="text-gray-400 font-bold text-sm mb-12 uppercase">Transfer to @{username}</p>
                        <input type="number" className="text-6xl font-black text-center outline-none w-full" value={amount.replace(/,/g, '')} onChange={(e) => setAmount(e.target.value)} />
                        <button onClick={() => {setStep('processing'); setTimeout(()=>setStep('details_popup'), 1500)}} className="w-full tiktok-red text-white py-4 rounded-xl font-bold mt-20">Confirm</button>
                    </div>
                </div>
            );

            // 4. PROCESSING
            if (step === 'processing') return (
                <div className="max-w-[420px] mx-auto bg-white min-h-screen flex items-center justify-center">
                    <div className="w-12 h-12 border-4 border-gray-100 border-t-[#FE2C55] rounded-full animate-spin"></div>
                </div>
            );

            // 5. RECEIPT POP-UP (EXACT MATCH)
            if (step === 'details_popup') return (
                <div className="fixed inset-0 bg-black/60 z-50 flex justify-center items-end">
                    <div className="w-full max-w-[420px] bg-white rounded-t-[40px] p-6 animate-slide-up">
                        <h2 className="text-[22px] font-black text-center mb-8 pt-2">Transfer details</h2>
                        <div className="space-y-4 text-[14px]">
                            <div className="flex justify-between"><span className="text-gray-400">LIVE rewards transfer to TikTok</span><span className="font-black text-right">@{username}</span></div>
                            <div className="flex justify-between items-center"><span className="text-gray-400">Amount</span><span className="font-black text-lg">USD {amount}</span></div>
                            <div className="flex justify-between items-center"><span className="text-gray-400">Status</span><span className="bg-[#418953] text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase">Withdrawal complete</span></div>
                            <div className="flex justify-between"><span className="text-gray-400">Payment method</span><span className="font-black">TikTok(@{username})</span></div>
                            <div className="flex justify-between"><span className="text-gray-400">Service fee</span><span className="font-black">30.00 USD</span></div>
                            <div className="flex justify-between items-center border-t border-gray-100 border-dashed pt-4">
                                <span className="text-gray-400">Amount you receive</span>
                                <span className="font-black">24,970.00 USD</span>
                            </div>
                            <div className="flex justify-between"><span className="text-gray-400">Date and time</span><span className="font-black">{DATA.date}</span></div>
                            <div className="flex justify-between items-center border-t border-gray-100 pb-4 pt-2">
                                <span className="text-gray-400">Request ID</span>
                                <span className="font-black tracking-tight">{DATA.requestId}</span>
                            </div>
                        </div>
                        <button onClick={() => setStep('dashboard')} className="w-full tiktok-red text-white py-4 rounded-2xl font-black text-lg mt-4 mb-6">Back to reward</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
